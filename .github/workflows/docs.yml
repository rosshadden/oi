name: docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: rust:build
        run: cargo build --verbose

      - uses: Swatinem/rust-cache@v2

      - name: rust:docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: fix:docs
        run: |
          mv ./target/doc/ ./public/docs/

      - uses: actions/upload-pages-artifact@v5
        id: docs
        with:
          path: ./public/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.docs.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v5
        id: docs
