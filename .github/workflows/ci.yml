name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@nightly
    - name: Rust - build
      run: cargo build --verbose
    - name: Rust - clippy
      run: cargo clippy --all -- -D warnings
    - name: Rust - tests
      run: cargo test --verbose
